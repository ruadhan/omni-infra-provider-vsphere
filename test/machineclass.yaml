metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: vsphere-small
spec:
  autoprovision:
    providerid: vsphere
    providerdata: |
      cpu: 2
      memory: 4096 # in MB
      disk_size: 10 # in GB
      network: "VM Network"
      datastore: "datastore1"
      datacenter: "Datacenter"
      resource_pool: "pool1"
      template: "talos-template"
      # storage_policy is optional. Name of a vSphere Storage Policy (SPBM) to
      # apply to the VM home and its disks. When omitted, the datastore default
      # policy is used. Useful e.g. to give control plane (etcd) disks a higher
      # Storage I/O Control share/reservation than worker disks.
      storage_policy: "my-storage-policy"
      # folder is optional.
      folder: "test"
      # cluster_folder is optional. When true, VMs are placed in a subfolder
      # named after the cluster (best-effort, derived from the machine set
      # name), created automatically under folder (or the datacenter VM folder).
      cluster_folder: true
      # tags is optional. vCenter tags to attach to the VM. Each entry is a
      # tag name, or "category/name" when the tag name exists in multiple
      # categories. Tags must already exist in vCenter.
      tags:
        - "backup-policy/daily"
        - "environment-prod"
      # ca_cert is optional.
      # Use a YAML literal block scalar. The cert content must be indented
      # 2 spaces deeper than the ca_cert key itself.
      ca_cert: |
        -----BEGIN CERTIFICATE-----
        MIIFazCCA1OgAwIBAgIRAIIQz7DSQONZRGPgu2OCiwAwDQYJKoZIhvcNAQELBQAw
        TzELMAkGA1UEBhMCVVMxKTAnBgNVBAoTIEludGVybmV0IFNlY3VyaXR5IFJlc2Vh
        cmNoIEdyb3VwMRUwEwYDVQQDEwxJU1JHIFJvb3QgWDEwHhcNMTUwNjA0MTEwNDM4
        -----END CERTIFICATE-----